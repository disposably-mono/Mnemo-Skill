<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Vocation as a call rooted in love</title>
  <desc id="desc">A central call from God branches to marriage, priesthood or consecrated life, and single blessedness, all rooted in love and directed toward service.</desc>
  <rect width="960" height="540" rx="32" fill="#f5f0e6"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="330" y="40" width="300" height="82" rx="18" fill="#4b315f"/>
    <text x="480" y="75" font-size="27" font-weight="700" fill="#fff">GOD'S CALL</text>
    <text x="480" y="103" font-size="17" fill="#efe2f5">vocation rooted in love</text>

    <path d="M480 122 V195 M480 165 H170 V220 M480 165 H790 V220" fill="none" stroke="#7b6389" stroke-width="7" stroke-linecap="round"/>

    <rect x="45" y="220" width="250" height="105" rx="18" fill="#d6e5cb" stroke="#42633b" stroke-width="3"/>
    <text x="170" y="263" font-size="24" font-weight="700" fill="#294125">MARRIAGE</text>
    <text x="170" y="294" font-size="16" fill="#294125">covenant and self-gift</text>

    <rect x="355" y="220" width="250" height="105" rx="18" fill="#d9e5f2" stroke="#365b7d" stroke-width="3"/>
    <text x="480" y="255" font-size="21" font-weight="700" fill="#27445e">PRIESTHOOD &amp;</text>
    <text x="480" y="282" font-size="21" font-weight="700" fill="#27445e">CONSECRATED LIFE</text>
    <text x="480" y="307" font-size="15" fill="#27445e">undivided service to God</text>

    <rect x="665" y="220" width="250" height="105" rx="18" fill="#f1dcc8" stroke="#865d38" stroke-width="3"/>
    <text x="790" y="263" font-size="22" font-weight="700" fill="#674326">SINGLE BLESSEDNESS</text>
    <text x="790" y="294" font-size="16" fill="#674326">holy life and witness</text>

    <path d="M170 325 V390 M480 325 V390 M790 325 V390" fill="none" stroke="#7b6389" stroke-width="6" stroke-linecap="round"/>
    <rect x="185" y="390" width="590" height="96" rx="20" fill="#8b4f4b"/>
    <text x="480" y="430" font-size="25" font-weight="700" fill="#fff">LOVE GOD AND ONE ANOTHER</text>
    <text x="480" y="461" font-size="17" fill="#fae8e6">chastity, sacrifice, service, and self-giving</text>
  </g>
</svg>
