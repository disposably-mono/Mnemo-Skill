# Field mappings: how a semantic Fact is rendered into a target note type's
# fields. The MONO defaults are built in; add a block here to target stock
# Anki types or community note types (e.g. AnKing) you have installed.
#
# Placeholders available per Fact type:
#   qa    -> {front}, {back}, {distractors}
#   cloze -> {text}, {extra}, {distractors}
#   list  -> {title}, {items}, {extra}
#   typed -> {prompt}, {answer}, {hints}, {extra}
#   image_occlusion -> {image}, {occlusion}, {header}, {back_extra}, {comments}
# Every type also supports {source}, {deck}, and {tags}.
#
# Example: target the stock "Basic" note type for qa Facts.
# [qa."Basic"]
# Front = "{front}"
# Back  = "{back}"
#
# Example: target stock "Cloze" for cloze Facts.
# [cloze."Cloze"]
# Text       = "{text}"
# "Back Extra" = "{extra}"
#
# To use a mapping, set the matching model in config.toml, for example:
# [target_note_types]
# qa = "Basic"
